services:
  postgres:
    image: postgres:16-alpine
    container_name: mobigate-postgres
    environment:
      POSTGRES_DB: mobigate
      POSTGRES_USER: mobigate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mobigate_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mobigate -d mobigate"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mobigate-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mobigate-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: mobigate
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-mobigate_dev}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
